<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Concurso de Fantasia</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      padding: 30px;
      margin: 0;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .titulo {
      text-align: center;
      margin-bottom: 20px;
    }

    .titulo h1 {
      margin: 0;
      font-size: 32px;
    }

    .titulo p {
      margin: 5px 0;
      font-size: 18px;
      color: #facc15;
      font-weight: bold;
    }

    .banner {
      width: 100%;
      height: 260px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .box {
      background: white;
      color: black;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #msg {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .ranking-item {
      padding: 12px 0;
      border-bottom: 1px solid #ddd;
    }

    .ranking-item:last-child {
      border-bottom: none;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="titulo">
    <h1>🎭 Concurso da Melhor Fantasia</h1>
    <p>💰 Premiação: R$100</p>
  </div>

  <img src="dinheiro_premiacao.png" class="banner" alt="Premiação">

  <!-- CADASTRO -->
  <div id="boxCadastro" class="box hidden">
    <h2>Seus dados</h2>

    <input id="nome" placeholder="Seu nome">
    <input id="gmailCadastro" placeholder="Seu gmail">
    <input id="fantasia" placeholder="Sua fantasia">

    <button id="btnCadastrar" onclick="cadastrar()">Enviar meus dados</button>
  </div>

  <!-- VOTAÇÃO -->
  <div id="boxVotacao" class="box hidden">
    <h2>Seu voto</h2>

    <input id="gmailVoto" placeholder="Seu gmail" onblur="carregarOpcoesVoto()">

    <select id="voto">
      <option value="">Digite seu gmail acima</option>
    </select>

    <button id="btnVotar" onclick="votar()">Votar</button>
  </div>

  <!-- RANKING -->
  <div id="boxRanking" class="box hidden">
    <h2>🏆 Top 10</h2>
    <div id="ranking">Carregando...</div>
  </div>

  <p id="msg"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // TROQUE AQUI:
  // "cadastro" = só mostra Seus dados
  // "votacao"  = só mostra Seu voto
  // "ranking"  = só mostra Top 10

  //const MODO = "cadastro";
  //const MODO = "votacao";
  const MODO = "ranking";

  const SUPABASE_URL = "https://gkijhexfndwejzlmqbkf.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_fm8fjCp8h4gIEJTZzopybg_jLE88hUC";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function iniciar() {
    document.getElementById("boxCadastro").classList.add("hidden");
    document.getElementById("boxVotacao").classList.add("hidden");
    document.getElementById("boxRanking").classList.add("hidden");
    document.getElementById("msg").innerText = "";

    if (MODO === "cadastro") {
      document.getElementById("boxCadastro").classList.remove("hidden");
    }

    if (MODO === "votacao") {
      document.getElementById("boxVotacao").classList.remove("hidden");
    }

    if (MODO === "ranking") {
      document.getElementById("boxRanking").classList.remove("hidden");
      carregarRanking();
    }
  }

  async function cadastrar() {
    const nome = document.getElementById("nome").value.trim();
    const gmail = document.getElementById("gmailCadastro").value.trim().toLowerCase();
    const fantasia = document.getElementById("fantasia").value.trim();
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btnCadastrar");

    if (!nome || !gmail || !fantasia) {
      msg.innerText = "Preencha todos os campos!";
      return;
    }

    btn.disabled = true;
    btn.innerText = "Enviando...";

    const { error } = await client.from("votos").insert([
      { nome, gmail, fantasia, voto: null }
    ]);

    if (error) {
      if (error.message.toLowerCase().includes("duplicate")) {
        msg.innerText = "Esse gmail já foi cadastrado.";
      } else {
        msg.innerText = error.message;
      }
      btn.disabled = false;
      btn.innerText = "Enviar meus dados";
      return;
    }

    msg.innerText = "Cadastrado com sucesso!";
    document.getElementById("nome").value = "";
    document.getElementById("gmailCadastro").value = "";
    document.getElementById("fantasia").value = "";
    btn.disabled = false;
    btn.innerText = "Enviar meus dados";
  }

  async function carregarOpcoesVoto() {
    const email = document.getElementById("gmailVoto").value.trim().toLowerCase();
    const select = document.getElementById("voto");
    const msg = document.getElementById("msg");

    select.innerHTML = '<option value="">Carregando...</option>';
    msg.innerText = "";

    if (!email) {
      select.innerHTML = '<option value="">Digite seu gmail acima</option>';
      return;
    }

    const { data: eu, error: erroEu } = await client
      .from("votos")
      .select("*")
      .eq("gmail", email)
      .single();

    if (erroEu || !eu) {
      select.innerHTML = '<option value="">Email não cadastrado</option>';
      msg.innerText = "Esse email não foi cadastrado.";
      return;
    }

    if (eu.voto) {
      select.innerHTML = '<option value="">Você já votou</option>';
      msg.innerText = "Esse email já registrou um voto.";
      return;
    }

    const { data, error } = await client.from("votos").select("*");

    if (error) {
      select.innerHTML = '<option value="">Erro ao carregar opções</option>';
      msg.innerText = "Erro ao carregar opções de voto.";
      return;
    }

    select.innerHTML = '<option value="">Selecione uma opção</option>';

    data
      .filter(p => p.gmail !== email)
      .forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.gmail;
        opt.textContent = `${p.fantasia} - ${p.nome}`;
        select.appendChild(opt);
      });
  }

  async function votar() {
    const email = document.getElementById("gmailVoto").value.trim().toLowerCase();
    const voto = document.getElementById("voto").value;
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btnVotar");

    if (!email) {
      msg.innerText = "Digite seu gmail.";
      return;
    }

    if (!voto) {
      msg.innerText = "Selecione uma opção para votar.";
      return;
    }

    const { data: eu, error: erroEu } = await client
      .from("votos")
      .select("*")
      .eq("gmail", email)
      .single();

    if (erroEu || !eu) {
      msg.innerText = "Esse email não foi cadastrado.";
      return;
    }

    if (eu.voto) {
      msg.innerText = "Esse email já votou.";
      return;
    }

    if (email === voto) {
      msg.innerText = "Você não pode votar em si mesmo.";
      return;
    }

    btn.disabled = true;
    btn.innerText = "Enviando...";

    const { error } = await client
      .from("votos")
      .update({ voto: voto })
      .eq("gmail", email);

    if (error) {
      msg.innerText = error.message;
      btn.disabled = false;
      btn.innerText = "Votar";
      return;
    }

    msg.innerText = "Voto registrado!";
    document.getElementById("gmailVoto").value = "";
    document.getElementById("voto").innerHTML = '<option value="">Digite seu gmail acima</option>';
    btn.disabled = false;
    btn.innerText = "Votar";
  }

  async function carregarRanking() {
    const rankingDiv = document.getElementById("ranking");

    const { data, error } = await client.from("votos").select("*");

    if (error) {
      rankingDiv.innerHTML = "Erro ao carregar ranking.";
      return;
    }

    const contagem = {};

    data.forEach(p => {
      if (p.voto) {
        contagem[p.voto] = (contagem[p.voto] || 0) + 1;
      }
    });

    const ranking = data
      .map(p => ({
        nome: p.nome,
        fantasia: p.fantasia,
        votos: contagem[p.gmail] || 0
      }))
      .sort((a, b) => {
        if (b.votos !== a.votos) return b.votos - a.votos;
        return a.nome.localeCompare(b.nome, "pt-BR");
      })
      .slice(0, 10);

    if (ranking.length === 0) {
      rankingDiv.innerHTML = "Nenhum dado encontrado.";
      return;
    }

    rankingDiv.innerHTML = ranking.map((r, i) => `
      <div class="ranking-item">
        <strong>${i + 1}º - ${r.fantasia}</strong><br>
        ${r.nome} - ${r.votos} voto(s)
      </div>
    `).join("");
  }

  iniciar();
</script>

</body>
</html>
